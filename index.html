<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#26282b" />
<title>여행 기록</title>
<style>
  /* ===== 테마 변수 (무채색 다크) ===== */
  :root {
    --bg: #26282b;
    --card: #2f3236;
    --card-2: #34383c;
    --line: #3d4145;
    --line-2: #4a4e53;
    --text: #e7e8ea;
    --muted: #9a9ea3;
    --faint: #7b8086;
    --accent: #e7e8ea;
    --accent-text: #1f2123;
    --danger: #b56a66;
    --radius: 10px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
    color: var(--text);
    min-height: 100vh;
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== 레이아웃 ===== */
  .app { max-width: 560px; margin: 0 auto; padding: 18px 14px 120px; }
  header.top { padding: 4px 2px 16px; }
  header.top h1 { margin: 0; font-size: 21px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
  header.top p { margin: 5px 0 0; font-size: 12.5px; color: var(--muted); }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 14px;
  }

  /* ===== 상단 바 (상세화면 뒤로가기 등) ===== */
  .bar { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .bar .spacer { flex: 1; }

  /* ===== 여행 목록 ===== */
  .trip-card {
    width: 100%; text-align: left; display: flex; align-items: center; gap: 10px;
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 15px 14px; margin-bottom: 10px; min-height: 64px;
  }
  .trip-card:active { opacity: .85; }
  .trip-card .tc-main { flex: 1; min-width: 0; }
  .trip-card .tc-name { font-size: 16px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .trip-card .tc-meta { font-size: 12.5px; color: var(--muted); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .trip-card .tc-arrow { color: var(--faint); font-size: 22px; line-height: 1; }

  /* ===== 버튼 ===== */
  button {
    font-family: inherit; cursor: pointer; border: none; border-radius: var(--radius-sm);
    font-size: 15px; min-height: 44px; padding: 0 14px;
  }
  button:active { opacity: .85; }
  .btn-primary { background: var(--accent); color: var(--accent-text); font-weight: 600; }
  .btn-soft { background: var(--card-2); color: var(--text); border: 1px solid var(--line-2); }
  .btn-ghost { background: transparent; color: var(--muted); min-height: 36px; padding: 0 8px; font-size: 13px; }
  .btn-danger { background: var(--danger); color: #1f1414; font-weight: 600; }
  .btn-icon { background: transparent; min-height: 36px; min-width: 36px; padding: 0; font-size: 16px; color: var(--muted); }
  .full { width: 100%; }

  /* ===== 탭 ===== */
  .tabs { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 14px; }
  .tabs button {
    min-height: 48px; font-size: 15.5px; font-weight: 600;
    background: var(--card); color: var(--muted); border: 1px solid var(--line);
  }
  .tabs button.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

  /* ===== 폼 ===== */
  .form-grid { display: flex; flex-direction: column; gap: 12px; }
  /* minmax(0,1fr) 로 칸이 내용 너비에 밀리지 않고 정확히 절반씩 나뉨 (겹침 방지) */
  .row2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  .row2 > * { min-width: 0; }
  label.fld { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--muted); min-width: 0; }
  input, textarea, select.fldsel {
    font-family: inherit; font-size: 16px; border: 1px solid var(--line-2); border-radius: var(--radius-sm);
    padding: 11px 12px; background: var(--card-2); color: var(--text);
    width: 100%; min-width: 0; max-width: 100%;
  }
  input::placeholder, textarea::placeholder { color: var(--faint); }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #6f757b; }
  textarea { resize: vertical; min-height: 56px; }
  /* 모바일 네이티브 날짜/시간 입력이 고유 너비로 칸을 밀어내는 것 방지 */
  input[type="date"], input[type="time"], input[type="number"] {
    -webkit-appearance: none; appearance: none; color-scheme: dark;
  }

  .add-toggle { margin-bottom: 12px; }

  /* ===== 리스트 항목 ===== */
  .item {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 13px;
    margin-bottom: 10px;
  }
  .item .head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .item .title { font-size: 15.5px; font-weight: 600; }
  .item .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .item .note { font-size: 14px; color: #c7cacd; margin-top: 8px; white-space: pre-wrap; line-height: 1.45; }
  .item .amt { font-size: 16.5px; font-weight: 700; color: var(--text); white-space: nowrap; }
  .item .ops { display: flex; gap: 2px; }

  .badge {
    display: inline-block; font-size: 11.5px; font-weight: 600; padding: 2px 8px; border-radius: 5px;
    color: var(--muted); border: 1px solid var(--line-2); background: transparent;
  }

  /* ===== 경비 요약 ===== */
  .summary { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
  .chip {
    background: var(--card-2); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 9px 10px;
    display: flex; flex-direction: column; gap: 4px; min-width: 0;
  }
  .chip .clabel { color: var(--muted); font-size: 11.5px; }
  .chip .cval { font-weight: 700; color: var(--text); font-size: 14.5px; overflow: hidden; text-overflow: ellipsis; }
  .total {
    margin-top: 12px; background: var(--card-2); border: 1px solid var(--line-2);
    border-radius: var(--radius-sm); padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .total .tlabel { font-size: 14px; color: var(--muted); }
  .total .tval { font-size: 21px; font-weight: 800; color: var(--text); }

  /* ===== 빈 상태 ===== */
  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 28px 10px; line-height: 1.6; }
  .empty .big { font-size: 26px; display: block; margin-bottom: 8px; opacity: .7; }

  /* ===== 모달 ===== */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal {
    background: var(--card); border: 1px solid var(--line-2); border-radius: 12px; width: 100%; max-width: 380px;
    padding: 18px; box-shadow: 0 18px 50px rgba(0,0,0,0.5);
  }
  .modal h3 { margin: 0 0 14px; font-size: 17px; font-weight: 700; color: var(--text); }
  .modal p.msg { margin: 2px 0 18px; font-size: 15px; line-height: 1.55; white-space: pre-wrap; color: #cdd0d3; }
  .modal .form-grid { margin-bottom: 16px; }

  /* ===== 토스트 ===== */
  .toast {
    position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%);
    background: rgba(15,16,18,0.95); border: 1px solid var(--line-2);
    color: var(--text); padding: 11px 18px; border-radius: var(--radius-sm);
    font-size: 14px; z-index: 60; transition: opacity .3s ease; max-width: 88%; text-align: center;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="app">

    <!-- ============ 목록 화면 ============ -->
    <div id="listView">
      <header class="top">
        <h1>여행 기록</h1>
        <p>기록할 여행을 선택하거나 추가하세요</p>
      </header>
      <button class="btn-primary full" id="addTripBtn" style="margin-bottom:14px">＋ 새 여행 추가</button>
      <div id="tripList"></div>
      <div id="noTrip" class="empty hidden">
        <span class="big">🧳</span>
        아직 여행이 없어요.<br>위 <b>＋ 새 여행 추가</b> 버튼으로 시작해 보세요.
      </div>
    </div>

    <!-- ============ 상세 화면 ============ -->
    <div id="detailView" class="hidden">
      <div class="bar">
        <button class="btn-soft" id="backBtn">← 목록</button>
        <span class="spacer"></span>
        <button class="btn-ghost" id="renameTripBtn">이름수정</button>
        <button class="btn-ghost" id="deleteTripBtn">삭제</button>
      </div>
      <header class="top">
        <h1 id="detailTitle"></h1>
        <p id="detailCur"></p>
      </header>

      <!-- 탭 -->
      <div class="tabs">
        <button id="tabSchedule" class="active" onclick="switchTab('schedule')">일정</button>
        <button id="tabExpense" onclick="switchTab('expense')">경비</button>
      </div>

      <!-- ===== 일정 탭 ===== -->
      <section id="panelSchedule">
        <div class="add-toggle">
          <button class="btn-soft full" onclick="toggleForm('sForm')">＋ 일정 추가</button>
        </div>
        <div class="card hidden" id="sForm">
          <div class="form-grid">
            <div class="row2">
              <label class="fld">날짜<input type="date" id="sDate"></label>
              <label class="fld">시간<input type="time" id="sTime"></label>
            </div>
            <label class="fld">장소<input type="text" id="sPlace" placeholder="예: 오사카성"></label>
            <label class="fld">비고<textarea id="sNote" placeholder="메모, 예약번호 등"></textarea></label>
            <div class="row2">
              <button class="btn-soft" onclick="cancelEdit('schedule')">취소</button>
              <button class="btn-primary" id="sSaveBtn" onclick="saveSchedule()">저장</button>
            </div>
          </div>
        </div>
        <div id="scheduleList"></div>
      </section>

      <!-- ===== 경비 탭 ===== -->
      <section id="panelExpense" class="hidden">
        <div class="card">
          <div class="summary" id="expSummary"></div>
          <div class="total">
            <span class="tlabel">총 합계</span>
            <span class="tval" id="expTotal">-</span>
          </div>
        </div>

        <div class="add-toggle">
          <button class="btn-soft full" onclick="toggleForm('eForm')">＋ 경비 추가</button>
        </div>
        <div class="card hidden" id="eForm">
          <div class="form-grid">
            <label class="fld">구분
              <select class="fldsel" id="eCat">
                <option>이동수단</option><option>식사</option><option>카페</option><option>숙박</option><option>기타</option>
              </select>
            </label>
            <div class="row2">
              <label class="fld">날짜<input type="date" id="eDate"></label>
              <label class="fld">금액<input type="text" id="eAmount" inputmode="numeric" placeholder="0"></label>
            </div>
            <label class="fld">장소<input type="text" id="ePlace" placeholder="예: 편의점, 지하철"></label>
            <div class="row2">
              <button class="btn-soft" onclick="cancelEdit('expense')">취소</button>
              <button class="btn-primary" id="eSaveBtn" onclick="saveExpense()">저장</button>
            </div>
          </div>
        </div>
        <div id="expenseList"></div>
      </section>
    </div>

  </div>

  <!-- ===== 여행 추가/수정 모달 ===== -->
  <div class="modal-overlay hidden" id="tripModal">
    <div class="modal">
      <h3 id="tripModalTitle">새 여행</h3>
      <div class="form-grid">
        <label class="fld">여행 이름
          <input type="text" id="mTripName" placeholder="예: 오사카 3박4일">
        </label>
        <label class="fld">통화
          <select class="fldsel" id="mTripCurSel">
            <option value="₩">₩ 원 (KRW)</option>
            <option value="$">$ 달러 (USD)</option>
            <option value="¥">¥ 엔 (JPY)</option>
            <option value="€">€ 유로 (EUR)</option>
            <option value="__custom">직접 입력…</option>
          </select>
        </label>
        <label class="fld hidden" id="mTripCurCustomWrap">통화 기호 직접 입력
          <input type="text" id="mTripCurCustom" placeholder="예: ฿, ₫, A$" maxlength="4">
        </label>
      </div>
      <div class="row2">
        <button class="btn-soft" onclick="closeTripModal()">취소</button>
        <button class="btn-primary" onclick="submitTripModal()">저장</button>
      </div>
    </div>
  </div>

  <!-- ===== 확인(삭제) 모달 ===== -->
  <div class="modal-overlay hidden" id="confirmModal">
    <div class="modal">
      <p class="msg" id="confirmMsg"></p>
      <div class="row2">
        <button class="btn-soft" onclick="resolveConfirm(false)">취소</button>
        <button class="btn-danger" id="confirmOkBtn" onclick="resolveConfirm(true)">삭제</button>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast hidden"></div>

<script>
/* =========================================================
   데이터 모델
   trips: [{ id, name, currency, schedules:[], expenses:[] }]
   schedule: { id, date, time, place, note }
   expense:  { id, category, date, place, amount }
   ========================================================= */
const STORAGE_KEY = 'cloudTravelData_v1';
const CATEGORIES = ['이동수단','식사','카페','숙박','기타'];

let state = { trips: [], currentTripId: null };
let currentView = 'list';   // 'list' | 'detail'
let activeTab = 'schedule';
let editing = { schedule: null, expense: null };

/* ---------- 저장 / 불러오기 ---------- */
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.trips)) state = parsed;
    }
  } catch (e) {
    console.error('데이터 불러오기 실패', e);
    state = { trips: [], currentTripId: null };
  }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.error('저장 실패', e); showToast('저장에 실패했습니다. 저장공간을 확인해주세요.'); }
}

/* ---------- 유틸 ---------- */
function uid() { return Date.now().toString(36) + Math.floor(Math.random()*1e6).toString(36); }
function currentTrip() { return state.trips.find(t => t.id === state.currentTripId) || null; }
function fmtMoney(n, sym) {
  if (sym === undefined) { const t = currentTrip(); sym = t ? t.currency : '₩'; }
  const num = Number(n) || 0;
  const hasDec = num % 1 !== 0;
  const str = num.toLocaleString('ko-KR', { minimumFractionDigits: hasDec ? 2 : 0, maximumFractionDigits: 2 });
  return sym + str;
}
function esc(s) { return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* 금액 입력칸: 세 자리마다 쉼표 자동 삽입 */
function formatAmountField(el) {
  let v = el.value.replace(/[^\d.]/g, '');
  const firstDot = v.indexOf('.');
  if (firstDot !== -1) {
    v = v.slice(0, firstDot + 1) + v.slice(firstDot + 1).replace(/\./g, '');
  }
  const parts = v.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  el.value = parts.join('.');
}
function parseAmount(str) { return parseFloat(String(str).replace(/,/g, '')); }

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => el.classList.add('hidden'), 300);
  }, 1800);
}

/* ---------- 확인 모달 ---------- */
let confirmResolver = null;
function showConfirm(msg, okText) {
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmOkBtn').textContent = okText || '삭제';
  document.getElementById('confirmModal').classList.remove('hidden');
  return new Promise(res => { confirmResolver = res; });
}
function resolveConfirm(val) {
  document.getElementById('confirmModal').classList.add('hidden');
  if (confirmResolver) { confirmResolver(val); confirmResolver = null; }
}

/* ---------- 여행 추가/수정 모달 ---------- */
let tripModalMode = 'add';
function openTripModal(mode) {
  tripModalMode = mode;
  const t = currentTrip();
  document.getElementById('tripModalTitle').textContent = mode === 'edit' ? '여행 수정' : '새 여행';
  const nameEl = document.getElementById('mTripName');
  const selEl = document.getElementById('mTripCurSel');
  const customWrap = document.getElementById('mTripCurCustomWrap');
  const customEl = document.getElementById('mTripCurCustom');

  customWrap.classList.add('hidden');
  customEl.value = '';

  if (mode === 'edit' && t) {
    nameEl.value = t.name;
    const known = ['₩','$','¥','€'];
    if (known.includes(t.currency)) {
      selEl.value = t.currency;
    } else {
      selEl.value = '__custom';
      customWrap.classList.remove('hidden');
      customEl.value = t.currency;
    }
  } else {
    nameEl.value = '';
    selEl.value = '₩';
  }
  document.getElementById('tripModal').classList.remove('hidden');
  setTimeout(() => nameEl.focus(), 50);
}
function closeTripModal() { document.getElementById('tripModal').classList.add('hidden'); }
function onCurSelChange() {
  const sel = document.getElementById('mTripCurSel');
  document.getElementById('mTripCurCustomWrap').classList.toggle('hidden', sel.value !== '__custom');
}
function submitTripModal() {
  const name = document.getElementById('mTripName').value.trim();
  if (!name) { showToast('여행 이름을 입력해주세요.'); return; }
  const sel = document.getElementById('mTripCurSel').value;
  let cur = sel;
  if (sel === '__custom') {
    cur = document.getElementById('mTripCurCustom').value.trim();
    if (!cur) { showToast('통화 기호를 입력해주세요.'); return; }
  }
  if (tripModalMode === 'edit') {
    const t = currentTrip(); if (t) { t.name = name; t.currency = cur; }
  } else {
    const trip = { id: uid(), name, currency: cur, schedules: [], expenses: [] };
    state.trips.push(trip);
    state.currentTripId = trip.id;
    currentView = 'detail';        // 새 여행을 만들면 바로 상세로 진입
    activeTab = 'schedule';
    resetForms();
  }
  closeTripModal();
  save(); render();
}

/* ---------- 화면 전환 ---------- */
function openTrip(id) {
  state.currentTripId = id;
  currentView = 'detail';
  resetForms();
  switchTab('schedule');
  save(); render();
}
function goList() {
  currentView = 'list';
  resetForms();
  save(); render();
}
async function deleteTrip() {
  const t = currentTrip(); if (!t) return;
  const ok = await showConfirm(`'${t.name}' 여행을 삭제할까요?\n일정과 경비 기록이 모두 삭제됩니다.`);
  if (!ok) return;
  state.trips = state.trips.filter(x => x.id !== t.id);
  state.currentTripId = null;
  currentView = 'list';
  save(); render();
}

/* ---------- 탭 / 폼 토글 ---------- */
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabSchedule').classList.toggle('active', tab==='schedule');
  document.getElementById('tabExpense').classList.toggle('active', tab==='expense');
  document.getElementById('panelSchedule').classList.toggle('hidden', tab!=='schedule');
  document.getElementById('panelExpense').classList.toggle('hidden', tab!=='expense');
}
function toggleForm(id) { document.getElementById(id).classList.toggle('hidden'); }
function resetForms() {
  ['sForm','eForm'].forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('hidden'); });
  editing.schedule = null; editing.expense = null;
  const sb = document.getElementById('sSaveBtn'); if (sb) sb.textContent='저장';
  const eb = document.getElementById('eSaveBtn'); if (eb) eb.textContent='저장';
}
function cancelEdit(kind) {
  if (kind === 'schedule') { editing.schedule = null; document.getElementById('sForm').classList.add('hidden'); clearScheduleForm(); document.getElementById('sSaveBtn').textContent='저장'; }
  else { editing.expense = null; document.getElementById('eForm').classList.add('hidden'); clearExpenseForm(); document.getElementById('eSaveBtn').textContent='저장'; }
}

/* ---------- 일정 ---------- */
function clearScheduleForm() { sDate.value=''; sTime.value=''; sPlace.value=''; sNote.value=''; }
function saveSchedule() {
  const t = currentTrip(); if (!t) return;
  const date = sDate.value, time = sTime.value, place = sPlace.value.trim(), note = sNote.value.trim();
  if (!date && !place) { showToast('날짜 또는 장소를 입력해주세요.'); return; }
  if (editing.schedule) {
    const it = t.schedules.find(s => s.id === editing.schedule);
    if (it) Object.assign(it, { date, time, place, note });
    editing.schedule = null; document.getElementById('sSaveBtn').textContent='저장';
  } else {
    t.schedules.push({ id: uid(), date, time, place, note });
  }
  clearScheduleForm();
  document.getElementById('sForm').classList.add('hidden');
  save(); renderSchedule();
}
function editSchedule(id) {
  const t = currentTrip(); const it = t.schedules.find(s => s.id===id); if (!it) return;
  sDate.value=it.date||''; sTime.value=it.time||''; sPlace.value=it.place||''; sNote.value=it.note||'';
  editing.schedule = id;
  document.getElementById('sSaveBtn').textContent='수정 완료';
  document.getElementById('sForm').classList.remove('hidden');
  document.getElementById('sForm').scrollIntoView({behavior:'smooth', block:'center'});
}
async function deleteSchedule(id) {
  const ok = await showConfirm('이 일정을 삭제할까요?');
  if (!ok) return;
  const t = currentTrip(); t.schedules = t.schedules.filter(s => s.id!==id);
  save(); renderSchedule();
}

/* ---------- 경비 ---------- */
function clearExpenseForm() { eCat.value='이동수단'; eDate.value=''; ePlace.value=''; eAmount.value=''; }
function saveExpense() {
  const t = currentTrip(); if (!t) return;
  const category = eCat.value, date = eDate.value, place = ePlace.value.trim();
  const amount = parseAmount(eAmount.value);
  if (isNaN(amount)) { showToast('금액을 입력해주세요.'); return; }
  if (editing.expense) {
    const it = t.expenses.find(e => e.id === editing.expense);
    if (it) Object.assign(it, { category, date, place, amount });
    editing.expense = null; document.getElementById('eSaveBtn').textContent='저장';
  } else {
    t.expenses.push({ id: uid(), category, date, place, amount });
  }
  clearExpenseForm();
  document.getElementById('eForm').classList.add('hidden');
  save(); renderExpense();
}
function editExpense(id) {
  const t = currentTrip(); const it = t.expenses.find(e => e.id===id); if (!it) return;
  eCat.value=it.category||'기타'; eDate.value=it.date||''; ePlace.value=it.place||'';
  eAmount.value = String(it.amount); formatAmountField(eAmount);
  editing.expense = id;
  document.getElementById('eSaveBtn').textContent='수정 완료';
  document.getElementById('eForm').classList.remove('hidden');
  document.getElementById('eForm').scrollIntoView({behavior:'smooth', block:'center'});
}
async function deleteExpense(id) {
  const ok = await showConfirm('이 경비를 삭제할까요?');
  if (!ok) return;
  const t = currentTrip(); t.expenses = t.expenses.filter(e => e.id!==id);
  save(); renderExpense();
}

/* ---------- 렌더링 ---------- */
function renderTripList() {
  const box = document.getElementById('tripList');
  const noTrip = document.getElementById('noTrip');
  if (!state.trips.length) { box.innerHTML=''; noTrip.classList.remove('hidden'); return; }
  noTrip.classList.add('hidden');
  box.innerHTML = state.trips.map(t => {
    const total = t.expenses.reduce((s,e)=>s+(Number(e.amount)||0),0);
    return `<button class="trip-card" onclick="openTrip('${t.id}')">
      <span class="tc-main">
        <span class="tc-name">${esc(t.name)}</span>
        <span class="tc-meta">일정 ${t.schedules.length} · 경비 ${fmtMoney(total, t.currency)}</span>
      </span>
      <span class="tc-arrow">›</span>
    </button>`;
  }).join('');
}

function renderDetail() {
  const t = currentTrip();
  if (!t) { currentView = 'list'; render(); return; }
  document.getElementById('detailTitle').textContent = t.name;
  document.getElementById('detailCur').textContent = `통화: ${t.currency}`;
  renderSchedule();
  renderExpense();
}

function renderSchedule() {
  const t = currentTrip(); const box = document.getElementById('scheduleList');
  if (!t) { box.innerHTML=''; return; }
  const items = [...t.schedules].sort((a,b) => {
    const da = (a.date||'')+'T'+(a.time||''), db=(b.date||'')+'T'+(b.time||'');
    return da < db ? -1 : da > db ? 1 : 0;
  });
  if (!items.length) {
    box.innerHTML = `<div class="empty"><span class="big">🗓</span>아직 등록된 일정이 없어요.<br>위 버튼으로 일정을 추가해 보세요.</div>`;
    return;
  }
  box.innerHTML = items.map(s => `
    <div class="item">
      <div class="head">
        <div>
          <div class="title">${esc(s.place) || '(장소 미입력)'}</div>
          <div class="sub">${formatDateLabel(s.date)}${s.time ? ' · '+s.time : ''}</div>
        </div>
        <div class="ops">
          <button class="btn-icon" onclick="editSchedule('${s.id}')">✏️</button>
          <button class="btn-icon" onclick="deleteSchedule('${s.id}')">🗑️</button>
        </div>
      </div>
      ${s.note ? `<div class="note">${esc(s.note)}</div>` : ''}
    </div>`).join('');
}

function renderExpense() {
  const t = currentTrip();
  const box = document.getElementById('expenseList');
  const sumBox = document.getElementById('expSummary');
  if (!t) { box.innerHTML=''; sumBox.innerHTML=''; document.getElementById('expTotal').textContent='-'; return; }

  const totals = {}; CATEGORIES.forEach(c => totals[c]=0);
  let grand = 0;
  t.expenses.forEach(e => { totals[e.category] = (totals[e.category]||0) + (Number(e.amount)||0); grand += Number(e.amount)||0; });

  sumBox.innerHTML = CATEGORIES.map(c => `
    <div class="chip">
      <span class="clabel">${c}</span>
      <span class="cval">${fmtMoney(totals[c])}</span>
    </div>`).join('');
  document.getElementById('expTotal').textContent = fmtMoney(grand);

  const items = [...t.expenses].sort((a,b) => (a.date||'') < (b.date||'') ? -1 : (a.date||'') > (b.date||'') ? 1 : 0);
  if (!items.length) {
    box.innerHTML = `<div class="empty"><span class="big">💳</span>아직 등록된 경비가 없어요.<br>위 버튼으로 경비를 추가해 보세요.</div>`;
    return;
  }
  box.innerHTML = items.map(e => `
    <div class="item">
      <div class="head">
        <div>
          <div class="title"><span class="badge">${e.category}</span> ${esc(e.place)||''}</div>
          <div class="sub">${formatDateLabel(e.date)}</div>
        </div>
        <div style="text-align:right">
          <div class="amt">${fmtMoney(e.amount)}</div>
          <div class="ops" style="justify-content:flex-end">
            <button class="btn-icon" onclick="editExpense('${e.id}')">✏️</button>
            <button class="btn-icon" onclick="deleteExpense('${e.id}')">🗑️</button>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function formatDateLabel(d) {
  if (!d) return '날짜 미입력';
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  const days = ['일','월','화','수','목','금','토'];
  const dt = new Date(d + 'T00:00:00');
  const wd = isNaN(dt.getTime()) ? '' : ' ('+days[dt.getDay()]+')';
  return `${parts[0]}.${parts[1]}.${parts[2]}${wd}`;
}

function render() {
  document.getElementById('listView').classList.toggle('hidden', currentView !== 'list');
  document.getElementById('detailView').classList.toggle('hidden', currentView !== 'detail');
  if (currentView === 'list') renderTripList();
  else renderDetail();
}

/* ---------- 이벤트 바인딩 ---------- */
document.getElementById('addTripBtn').addEventListener('click', () => openTripModal('add'));
document.getElementById('backBtn').addEventListener('click', goList);
document.getElementById('renameTripBtn').addEventListener('click', () => { if (currentTrip()) openTripModal('edit'); });
document.getElementById('deleteTripBtn').addEventListener('click', deleteTrip);
document.getElementById('mTripCurSel').addEventListener('change', onCurSelChange);
document.getElementById('eAmount').addEventListener('input', e => formatAmountField(e.target));
document.getElementById('tripModal').addEventListener('click', e => { if (e.target.id === 'tripModal') closeTripModal(); });
document.getElementById('confirmModal').addEventListener('click', e => { if (e.target.id === 'confirmModal') resolveConfirm(false); });

/* ---------- 시작 ---------- */
load();
render();
</script>
</body>
</html>
